name: CI/CD Two-Tier Project

on:
  push:
    # Trigger only when changes are made inside this specific project folder
    paths:
      - '1-Two-Tier-WebApp/**'
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./1-Two-Tier-WebApp/backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./1-Two-Tier-WebApp/frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-frontend:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to Docker Hub on the EC2
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # 2. Pull the fresh images from Docker Hub
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-backend:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-frontend:latest

            # 3. Stop and remove existing containers (ignore errors if they aren't running)
            docker stop backend frontend || true
            docker rm backend frontend || true

            # 4. Run Backend
            # NOTE: Replace <DB_PRIVATE_IP> with the Private IP of your Mongo EC2
            docker run -d \
              --name backend \
              --network bridge \
              -p 5000:5000 \
              -e MONGO_URI=mongodb://${{ secrets.DB_PRIVATE_IP }}:27017/devops_db \
              ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-backend:latest

            # 5. Run Frontend
            docker run -d \
              --name frontend \
              --network bridge \
              -p 80:80 \
              -e REACT_APP_API_URL=http://${{ secrets.EC2_HOST }}:5000/api \
              ${{ secrets.DOCKER_HUB_USERNAME }}/two-tier-frontend:latest
